kind = "web"
previewPath = "/"
title = "KI-Automatisierung Website"
version = "1.0.0"
id = "artifacts/ki-agentur"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19001

[services.development]
run = "pnpm --filter @workspace/ki-agentur run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ki-agentur", "run", "build" ]
publicDir = "artifacts/ki-agentur/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19001"
BASE_PATH = "/"
